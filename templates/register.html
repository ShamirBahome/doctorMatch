{% extends 'base.html' %}
{% block title %}Register - Guelph Doctor Finder{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow p-8">
        <h1 class="text-2xl font-bold mb-6 text-center">Create Account</h1>

        <form method="POST" action="/register" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">First Name *</label>
                <input type="text" name="first_name" required class="w-full border rounded-lg p-2">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Last Name</label>
                <input type="text" name="last_name" class="w-full border rounded-lg p-2">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Email *</label>
                <input type="email" name="email" required class="w-full border rounded-lg p-2">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Password *</label>
                <input type="password" name="password" required minlength="6" class="w-full border rounded-lg p-2">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Confirm Password *</label>
                <input type="password" name="confirm_password" required minlength="6" class="w-full border rounded-lg p-2">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
                Sign Up
            </button>
        </form>

        <p class="text-sm text-center text-gray-500 mt-4">
            Already have an account?
            <a href="/login" class="text-blue-600 hover:text-blue-800">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
