{% extends 'base.html' %}
{% block title %}Edit Doctor - Admin{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8">

    <a href="/admin" class="text-blue-600 hover:text-blue-800 mb-4 inline-block">← Back to Admin</a>

    <div class="bg-white rounded-2xl shadow p-8">
        <h1 class="text-2xl font-bold mb-6">✏️ Edit: {{ doctor.full_name }}</h1>

        <form action="/admin/edit/{{ doctor.id }}" method="POST" class="space-y-4">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">First Name</label>
                    <input type="text" name="first_name" value="{{ doctor.first_name }}" required
                           class="w-full border rounded-lg p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Last Name</label>
                    <input type="text" name="last_name" value="{{ doctor.last_name }}" required
                           class="w-full border rounded-lg p-2">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Gender</label>
                    <select name="gender" class="w-full border rounded-lg p-2">
                        <option value="Male" {% if doctor.gender == 'Male' %}selected{% endif %}>Male</option>
                        <option value="Female" {% if doctor.gender == 'Female' %}selected{% endif %}>Female</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Phone</label>
                    <input type="text" name="phone" value="{{ doctor.phone }}"
                           class="w-full border rounded-lg p-2">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Clinic Name</label>
                <input type="text" name="clinic_name" value="{{ doctor.clinic_name }}"
                       class="w-full border rounded-lg p-2">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Address</label>
                <input type="text" name="address" value="{{ doctor.address }}"
                       class="w-full border rounded-lg p-2">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Postal Code</label>
                    <input type="text" name="postal_code" value="{{ doctor.postal_code }}"
                           class="w-full border rounded-lg p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">CPSO Number</label>
                    <input type="text" name="cpso_number" value="{{ doctor.cpso_number }}"
                           class="w-full border rounded-lg p-2">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Languages</label>
                    <input type="text" name="languages" value="{{ doctor.languages }}"
                           class="w-full border rounded-lg p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Specializations</label>
                    <input type="text" name="specializations" value="{{ doctor.specializations }}"
                           class="w-full border rounded-lg p-2">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Years of Experience</label>
                    <input type="number" name="years_of_experience" value="{{ doctor.years_of_experience }}"
                           class="w-full border rounded-lg p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Education</label>
                    <input type="text" name="education" value="{{ doctor.education }}"
                           class="w-full border rounded-lg p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Wait Time (weeks)</label>
                    <input type="number" name="wait_time_weeks" value="{{ doctor.wait_time_weeks }}"
                           class="w-full border rounded-lg p-2">
                </div>
            </div>

            <div>
                <label class="flex items-center gap-2">
                    <input type="checkbox" name="accepting_new_patients" value="true"
                           {% if doctor.accepting_new_patients %}checked{% endif %} class="w-4 h-4">
                    <span class="font-medium">Accepting New Patients</span>
                </label>
            </div>

            <div class="flex gap-4">
                <button type="submit"
                        class="bg-blue-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-blue-700">
                    💾 Save Changes
                </button>
                <a href="/admin"
                   class="bg-gray-200 text-gray-700 font-bold py-3 px-8 rounded-lg hover:bg-gray-300">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
